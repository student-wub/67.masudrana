<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>67 Live Stream</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111;
    color:#fff;
}

.header{
    background:#181818;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:15px;
}

.player-box{
    width:100%;
    background:#000;
    border-radius:15px;
    overflow:hidden;
}

video{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
}

.controls{
    display:flex;
    gap:10px;
    margin-top:15px;
    flex-wrap:wrap;
}

.controls input{
    flex:1;
    min-width:200px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

.controls button{
    padding:12px 18px;
    border:none;
    border-radius:8px;
    background:#ff6600;
    color:white;
    cursor:pointer;
}

.controls button:hover{
    opacity:.9;
}

.upload{
    margin-top:15px;
}

.search{
    margin-top:20px;
}

.search input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

.channel-row{
    display:flex;
    overflow-x:auto;
    gap:12px;
    margin-top:15px;
    padding-bottom:10px;
}

.channel-row::-webkit-scrollbar{
    height:8px;
}

.channel-row::-webkit-scrollbar-thumb{
    background:#444;
    border-radius:10px;
}

.channel{
    min-width:110px;
    background:#1c1c1c;
    border-radius:12px;
    padding:10px;
    text-align:center;
    cursor:pointer;
    flex-shrink:0;
}

.channel:hover{
    background:#333;
}

.channel img{
    width:60px;
    height:60px;
    object-fit:contain;
    background:white;
    border-radius:10px;
}

.channel p{
    margin-top:8px;
    font-size:14px;
}

@media(max-width:600px){
    .header{
        font-size:22px;
    }

    .channel{
        min-width:90px;
    }

    .channel img{
        width:50px;
        height:50px;
    }
}
</style>
</head>
<body>

<div class="header">
    67 Live Stream
</div>

<div class="container">

    <div class="player-box">
        <video id="video" controls autoplay playsinline></video>
    </div>

    <div class="controls">
        <input id="url" placeholder="Paste M3U8 URL">
        <button onclick="playInput()">Play</button>
        <button onclick="togglePip()">PiP</button>
        <button onclick="fullscreen()">Fullscreen</button>
    </div>

    <div class="upload">
        <input type="file" id="m3uFile" accept=".m3u,.m3u8">
    </div>

    <div class="search">
        <input type="text" id="search" placeholder="Search channel...">
    </div>

    <div id="channels" class="channel-row"></div>

</div>

<script>

const video=document.getElementById("video");
const channelsDiv=document.getElementById("channels");
let hls;

const channels=[
{
name:"Demo TV",
logo:"https://upload.wikimedia.org/wikipedia/commons/2/2b/TV_icon.svg",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
}
];

function playStream(url){

localStorage.setItem("lastStream",url);

if(hls){
hls.destroy();
}

if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src=url;
}
}

function playInput(){
const url=document.getElementById("url").value.trim();
if(url) playStream(url);
}

function renderChannels(){

channelsDiv.innerHTML="";

channels.forEach(ch=>{

const div=document.createElement("div");
div.className="channel";

div.innerHTML=`
<img src="${ch.logo}">
<p>${ch.name}</p>
`;

div.onclick=()=>{
playStream(ch.url);
};

channelsDiv.appendChild(div);

});

}

renderChannels();

document.getElementById("search")
.addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

document.querySelectorAll(".channel")
.forEach(card=>{

card.style.display=
card.innerText.toLowerCase()
.includes(q)
?"block":"none";

});

});

document.getElementById("m3uFile")
.addEventListener("change",function(){

const file=this.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=e=>{
parseM3U(e.target.result);
};

reader.readAsText(file);

});

function parseM3U(text){

const lines=text.split("\n");

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

const name=
lines[i].split(",")[1]
||"Unknown";

const url=
lines[i+1]?.trim();

if(url && url.startsWith("http")){

channels.push({
name:name,
logo:"https://upload.wikimedia.org/wikipedia/commons/2/2b/TV_icon.svg",
url:url
});

}

}

}

renderChannels();

}

async function togglePip(){

if(document.pictureInPictureElement){
await document.exitPictureInPicture();
}else{
await video.requestPictureInPicture();
}

}

function fullscreen(){

if(video.requestFullscreen()){
video.requestFullscreen();
}

}

window.onload=()=>{

const last=
localStorage.getItem("lastStream");

if(last){
playStream(last);
}

};

</script>

</body>
</html>
