<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67 Live Stream</title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <main class="container">

        <div class="player-box">

    <video id="video"
           controls
           autoplay
           playsinline>
    </video>

    <div class="overlay-menu">

        <button
            class="overlay-btn"
            id="searchBtn">
            🔍
        </button>

        <button
            class="overlay-btn"
            id="toggleMenu">
            ▼
        </button>

    </div>

    <div class="url-box">

        <input
            type="text"
            id="url"
            placeholder="Paste M3U8 URL">

        <button onclick="playInput()">
            ▶ Play
        </button>

    </div>

    <div id="menuArea">

        <div id="cards"
             class="card-row">
        </div>

    </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
