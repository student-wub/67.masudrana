<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Streaming</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Live TV</h1>
                <p>Live Streaming</p>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#player" class="nav-link">Watch Now</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Live TV Streaming</h1>
            <p class="hero-subtitle">Watch Your Favorite Channels Live</p>
            <p class="hero-description">Crystal clear streaming, anytime, anywhere</p>
            <div class="hero-buttons">
                <a href="#player" class="btn btn-primary">Start Watching</a>
            </div>
        </div>
        <div class="hero-image">
            <div class="image-placeholder">
                <i class="fas fa-tv"></i>
            </div>
        </div>
    </section>

    <!-- Player Section -->
    <section id="player" class="player-section">
        <div class="container">
            <h2 class="section-title">Live Stream Player</h2>
            <div class="player-container">
                <div class="player-wrapper">
                    <div id="tv-player" class="tv-player">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading stream...</p>
                        </div>
                    </div>
                </div>
                <div class="player-info">
                    <h3>Now Playing</h3>
                    <p>Live TV Stream</p>
                    <button id="fullscreen-btn" class="btn btn-secondary">
                        <i class="fas fa-expand"></i> Fullscreen
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Live TV. All rights reserved.</p>
            <div class="social-links">
                <a href="#" title="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="#" title="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
