<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67 Live Stream</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <header class="header">
        <h1>67 Live Stream</h1>
    </header>

    <main class="container">

        <!-- Video Player -->
        <section class="player-section">
            <video id="video" controls autoplay playsinline></video>
        </section>

        <!-- Stream URL -->
        <section class="stream-box">
            <input
                type="text"
                id="streamUrl"
                placeholder="Paste M3U8 URL here">

            <button id="playBtn">
                Play
            </button>
        </section>

        <!-- Playlist Upload -->
        <section class="upload-box">
            <input
                type="file"
                id="playlistFile"
                accept=".m3u,.m3u8">
        </section>
<input
    type="text"
    id="searchBox"
    placeholder="Search channel..."
>
        <!-- Channel Row -->
        <section class="channel-wrapper">
            <h2>Channels</h2>

            <div id="channelRow" class="channel-row">

                <!-- Example Channel -->
                <div class="channel-card">
                    <img
                        src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2b/TV_icon.svg/512px-TV_icon.svg.png"
                        alt="Logo">

                    <span>Demo</span>
                </div>

            </div>
        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
